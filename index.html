<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pagina dark</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #333;
      color: white;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
    }
    nav a:hover {
      text-decoration: underline;
    }
    .logo {
      height: 50px;
    }
    main {
      padding: 20px;
    }
    img {
      max-width: 100%;
      height: auto;
      margin-top: 20px;
    }
    video {
      width: 100%;
      max-width: 600px;
      margin-top: 20px;
      display: block;
    }
  </style>
</head>
<body>

  <header>
    <img src="/imagenes/logo metalica.jpg" alt="Logo" class="logo">
    <nav>
      <a href="#">Inicio</a>
      <a href="#">Servicios</a>
      <a href="#">Acerca de</a>
      <a href="#">Contacto</a>
    </nav>
  </header>

  <main>
    <h1>Bienvenido a Mi Página</h1>
    <p>esta pagina esta diseñada para que tengas un buen estilo</p>
    <p>tenemos variedad de cosas BACANAS Y visualmente atractivas.</p>

    <img src="/imagenes/monster12.jpg" alt="Imagen 1">

    <video controls>
      <source src="https://www.youtube.com/watch?v=UIl27cgpKaw&list=RDUIl27cgpKaw&index=1" type="video">
     
    </video>
  </main>

</body>
</html>
